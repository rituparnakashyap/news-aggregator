# News Aggregator — Default Configuration

# News sources to fetch from. All enabled by default.
# API keys are loaded from .env (NEWSAPI_KEY, GUARDIAN_KEY).
sources:
  - name: newsapi     # newsapi.org — 100 req/day free
    enabled: true
  - name: guardian    # open-platform.theguardian.com — 500 req/day free
    enabled: true
  - name: gdelt       # gdeltproject.org — unlimited, no key required
    enabled: true

# Categories to aggregate. Each can optionally override the global aggregation
# config or restrict which sources to use.
#
# Full per-category aggregation example:
#   - name: technology
#     sources: [newsapi, guardian]   # optional: restrict sources for this category
#     aggregation:
#       strategy: TopN               # optional: override global strategy
#       params: {n: 3}               # optional: override strategy params
#       lookback_hours: 48           # optional: override lookback window
#       dedup_threshold: 0.90        # optional: override dedup sensitivity
#       output_template: |           # optional: custom Jinja2 template
#         {{ headline }}
#         {% for s in summaries %}{{ loop.index }}. {{ s }}
#         {% endfor %}
categories:
  - name: technology
  - name: finance
  - name: sports
  - name: politics

# Global aggregation settings (can be overridden per category via aggregation: block)
aggregation:
  # Strategy: "TopN" or "TopNLuckyM"
  strategy: TopN
  params:
    n: 5              # return top 5 articles per category
  lookback_hours: 24  # look back this many hours for articles
  dedup_threshold: 0.85  # Jaccard similarity threshold for near-duplicate merging

# LLM settings. Model and base_url can use ${ENV_VAR} placeholders.
llm:
  model: "${LLM_MODEL}"
  headline_max_chars: 100   # A — max characters for the generated headline
  summary_max_lines: 5      # B — number of per-story summary sentences (should match aggregation.params.n)
  temperature: 0.3

# Output format: "text" | "json" | "markdown"
output_format: text
